<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 Purr-fect Kitten Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffb6c1; --secondary: #a2d2ff; --background: #fff0f5; --card-bg: #ffffff; --text: #5c4d5c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }
        body { background-color: var(--background); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 600px; background: var(--card-bg); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; display: flex; flex-direction: column; min-height: 85vh; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; font-size: 1.5em; font-weight: 700; }
        .nav { display: flex; justify-content: space-around; background: #fff; padding: 15px 5px; border-bottom: 2px solid var(--background); }
        .nav button { background: none; border: none; font-size: 0.9em; font-weight: 600; color: #b0a0b0; cursor: pointer; padding: 5px 8px; border-radius: 15px; }
        .nav button.active { color: white; background: var(--secondary); }
        .content { padding: 20px; flex-grow: 1; overflow-y: auto; }
        .section { display: none; }
        .section.active { display: block; }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .kitten-profile-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: #eee; margin-right: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">🐾 Kitten Tracker</div>
    <div class="nav">
        <button class="active" onclick="switchTab('dashboard')">Home</button>
        <button onclick="switchTab('weighin')">Weigh In</button>
        <button onclick="switchTab('settings')">Settings</button>
    </div>

    <div class="content">
        <div id="dashboard" class="section active">
            <h3>Kittens</h3>
            <div id="kitten-list-display"></div>
        </div>

        <div id="weighin" class="section">
            <h3 style="margin-bottom: 15px;">New Weigh-In</h3>
            <select id="kitten-select" style="width:100%; padding:10px; margin-bottom:10px;"></select>
            <input type="date" id="weigh-date" style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="number" id="weight-input" placeholder="Weight (g)" style="width:100%; padding:10px; margin-bottom:10px;">
            <button class="btn-submit" onclick="handleSaveWeight()">Save to Cloud</button>
        </div>

        <div id="settings" class="section">
            <h3>Manage Kittens</h3>
            <div id="settings-ui"></div>
            <button class="btn-submit" onclick="saveLocalSettings()">Save Local Data</button>
        </div>
    </div>
</div>

<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbyfzrJe2swPRpwEpgLn2B7zYLuZR4INZE2QGIqERMXhr-Ao8vGQpiMA5h0vRuBvtV2C/exec";

    let kittens = JSON.parse(localStorage.getItem('kt_kittens_v3')) || [
        { id: 'p_gray', name: 'Gray Collar', img: '' },
        { id: 's_black', name: 'Black Collar', img: '' }
    ];

    function switchTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
        if(tabId === 'dashboard') renderDashboard();
    }

    // --- Google Sheets Sync ---
    async function handleSaveWeight() {
        const payload = {
            date: document.getElementById('weigh-date').value,
            kitten: document.getElementById('kitten-select').value,
            weight: document.getElementById('weight-input').value,
            type: 'weight'
        };

        try {
            await fetch(CLOUD_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            alert('Weight logged to Google Sheets!');
        } catch (e) {
            alert('Failed to connect to cloud.');
        }
    }

    // --- Local Storage Management ---
    function renderDashboard() {
        const container = document.getElementById('kitten-list-display');
        container.innerHTML = kittens.map(k => `
            <div style="display:flex; align-items:center; margin-bottom:10px; padding:10px; background:#fff; border-radius:10px; border:1px solid #eee;">
                <img src="${k.img || 'https://via.placeholder.com/60'}" class="kitten-profile-img">
                <span>${k.name}</span>
            </div>
        `).join('');
    }

    function initSettings() {
        const ui = document.getElementById('settings-ui');
        ui.innerHTML = kittens.map(k => `
            <div style="margin-bottom:20px;">
                <label>Name</label><input id="name-${k.id}" value="${k.name}" style="width:100%; padding:8px;">
                <label>Profile Picture</label><input type="file" accept="image/*" onchange="handleImage(this, '${k.id}')">
            </div>
        `).join('');
        
        const select = document.getElementById('kitten-select');
        select.innerHTML = kittens.map(k => `<option value="${k.id}">${k.name}</option>`).join('');
    }

    function handleImage(input, id) {
        const reader = new FileReader();
        reader.onload = e => kittens.find(k => k.id === id).img = e.target.result;
        reader.readAsDataURL(input.files[0]);
    }

    function saveLocalSettings() {
        kittens.forEach(k => k.name = document.getElementById(`name-${k.id}`).value);
        localStorage.setItem('kt_kittens_v3', JSON.stringify(kittens));
        alert('Settings saved locally!');
    }

    document.getElementById('weigh-date').valueAsDate = new Date();
    initSettings();
    renderDashboard();
</script>
</body>
</html>
