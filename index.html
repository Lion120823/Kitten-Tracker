<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 Purr-fect Kitten Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --primary: #ffb6c1; --secondary: #a2d2ff; --background: #fff0f5; --card-bg: #ffffff; --text: #5c4d5c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }
        body { background-color: var(--background); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 600px; background: var(--card-bg); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; display: flex; flex-direction: column; min-height: 85vh; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; font-size: 1.5em; font-weight: 700; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .nav { display: flex; justify-content: space-around; background: #fff; padding: 15px 5px; border-bottom: 2px solid var(--background); flex-wrap: wrap; }
        .nav button { background: none; border: none; font-size: 0.95em; font-weight: 600; color: #b0a0b0; cursor: pointer; padding: 5px 8px; border-radius: 15px; transition: all 0.3s; }
        .nav button.active { color: white; background: var(--secondary); }
        .content { padding: 20px; flex-grow: 1; overflow-y: auto; }
        .section { display: none; }
        .section.active { display: block; }
        .reminder-card { background: #fff9e6; border-left: 5px solid #ffcc00; padding: 15px; border-radius: 10px; margin-bottom: 15px; font-size: 0.9em; }
        .reminder-card strong { display: block; margin-bottom: 5px; color: #d4a000; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9em; }
        input, select { width: 100%; padding: 12px; border: 2px solid var(--background); border-radius: 10px; }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9em; }
        .history-table th { background: var(--background); color: var(--secondary); padding: 10px; text-align: left; }
        .history-table td { padding: 10px; border-bottom: 1px solid #eee; }
        .chart-container { position: relative; height: 250px; width: 100%; margin-bottom: 25px; }
        .kitten-edit { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">🐾 Kitten Tracker</div>
    <div class="nav">
        <button class="active" onclick="switchTab('dashboard', this)">Home</button>
        <button onclick="switchTab('weighin', this)">Weigh In</button>
        <button onclick="switchTab('history', this)">History</button>
        <button onclick="switchTab('settings', this)">Settings</button>
    </div>

    <div class="content">
        <div id="dashboard" class="section active">
            <h3 style="margin-bottom: 15px; color: var(--primary);">Health Reminders 🍼</h3>
            <div id="reminders-container"></div>
        </div>
        <div id="weighin" class="section">
            <h3 style="margin-bottom: 20px; color: var(--primary);">New Weigh-In ⚖️</h3>
            <select id="kitten-select" class="form-group"></select>
            <input type="date" id="weigh-date" class="form-group">
            <input type="number" id="weight-input" placeholder="Weight (g)" class="form-group">
            <button class="btn-submit" onclick="saveWeight()">Save Weight</button>
        </div>
        <div id="history" class="section">
            <div class="chart-container"><canvas id="growthChart"></canvas></div>
            <table class="history-table"><thead><tr><th>Date</th><th>Kitten</th><th>Weight</th></tr></thead><tbody id="history-table-body"></tbody></table>
        </div>
        <div id="settings" class="section">
            <h3 style="margin-bottom: 15px; color: var(--primary);">Add New Kitten 🆕</h3>
            <div class="form-group">
                <input type="text" id="new-name" placeholder="Kitten Name" class="form-group">
                <input type="text" id="new-mother" placeholder="Mother (Litter Name)" class="form-group">
                <input type="date" id="new-dob" class="form-group">
                <button class="btn-submit" style="background:var(--secondary);" onclick="addKitten()">Add Kitten</button>
            </div>
            <hr style="margin: 20px 0;">
            <h3 style="margin-bottom: 20px; color: var(--primary);">Manage Existing 🐱</h3>
            <div id="kitten-edit-list"></div>
            <button class="btn-submit" onclick="saveKittenNames()">Save All Changes</button>
            <button class="btn-submit" style="margin-top: 15px; background: #ff6b6b;" onclick="resetAppData()">Clear All Data</button>
        </div>
    </div>
</div>

<script>
    let kittens = JSON.parse(localStorage.getItem('kt_kittens_v3')) || [
        { id: 'p_gray', name: 'Gray Collar', mother: 'Porchetta', dob: '2026-05-25' },
        { id: 'p_red', name: 'Red Collar', mother: 'Porchetta', dob: '2026-05-25' },
        { id: 'p_violet', name: 'Violet Collar', mother: 'Porchetta', dob: '2026-05-25' },
        { id: 'p_pink', name: 'Pink Collar', mother: 'Porchetta', dob: '2026-05-25' },
        { id: 's_black', name: 'Black Collar', mother: 'Sassy', dob: '2026-06-01' },
        { id: 's_white', name: 'White Collar', mother: 'Sassy', dob: '2026-06-01' }
    ];

    const initialWeights = [
        { kittenId: 'p_gray', date: '2026-05-25', weight: 100 }, { kittenId: 'p_red', date: '2026-05-25', weight: 87 },
        { kittenId: 'p_violet', date: '2026-05-25', weight: 98 }, { kittenId: 'p_pink', date: '2026-05-25', weight: 74 },
        { kittenId: 'p_gray', date: '2026-05-26', weight: 114 }, { kittenId: 'p_red', date: '2026-05-26', weight: 94 },
        { kittenId: 'p_violet', date: '2026-05-26', weight: 108 }, { kittenId: 'p_pink', date: '2026-05-26', weight: 84 },
        { kittenId: 'p_gray', date: '2026-05-28', weight: 128 }, { kittenId: 'p_red', date: '2026-05-28', weight: 111 },
        { kittenId: 'p_violet', date: '2026-05-28', weight: 121 }, { kittenId: 'p_pink', date: '2026-05-28', weight: 97 },
        { kittenId: 'p_gray', date: '2026-05-30', weight: 137 }, { kittenId: 'p_red', date: '2026-05-30', weight: 123 },
        { kittenId: 'p_violet', date: '2026-05-30', weight: 135 }, { kittenId: 'p_pink', date: '2026-05-30', weight: 113 },
        { kittenId: 's_black', date: '2026-06-01', weight: 93 }, { kittenId: 's_white', date: '2026-06-01', weight: 84 },
        { kittenId: 'p_gray', date: '2026-06-01', weight: 158 }, { kittenId: 'p_red', date: '2026-06-01', weight: 138 },
        { kittenId: 'p_violet', date: '2026-06-01', weight: 143 }, { kittenId: 'p_pink', date: '2026-06-01', weight: 123 },
        { kittenId: 'p_gray', date: '2026-06-04', weight: 172 }, { kittenId: 'p_red', date: '2026-06-04', weight: 157 },
        { kittenId: 'p_violet', date: '2026-06-04', weight: 154 }, { kittenId: 'p_pink', date: '2026-06-04', weight: 137 },
        { kittenId: 's_black', date: '2026-06-04', weight: 128 }, { kittenId: 's_white', date: '2026-06-04', weight: 121 }
    ];

    let weights = JSON.parse(localStorage.getItem('kt_weights_v3')) || initialWeights;
    let myChart = null;

    function switchTab(tabId, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
        if(tabId === 'dashboard') loadDashboard();
        if(tabId === 'history') { loadHistoryTable(); renderChart(); }
    }

    function addKitten() {
        const name = document.getElementById('new-name').value;
        const mother = document.getElementById('new-mother').value;
        const dob = document.getElementById('new-dob').value;
        if(!name || !mother || !dob) return alert("Please fill in all fields.");
        
        kittens.push({ id: 'k_' + Date.now(), name, mother, dob });
        localStorage.setItem('kt_kittens_v3', JSON.stringify(kittens));
        alert("Kitten added!");
        location.reload();
    }

    function populateDropdown() {
        document.getElementById('kitten-select').innerHTML = kittens.map(k => `<option value="${k.id}">${k.name}</option>`).join('');
    }

    function populateSettings() {
        document.getElementById('kitten-edit-list').innerHTML = kittens.map(k => `
            <div class="kitten-edit">
                <label>Name</label><input type="text" id="edit-name-${k.id}" value="${k.name}">
                <label>Mother</label><input type="text" id="edit-mother-${k.id}" value="${k.mother || ''}">
                <label>DOB</label><input type="date" id="edit-dob-${k.id}" value="${k.dob || ''}">
            </div>
        `).join('');
    }

    async function saveWeight() {
        const kId = document.getElementById('kitten-select').value;
        const date = document.getElementById('weigh-date').value;
        const weight = parseFloat(document.getElementById('weight-input').value);
        if(!date || isNaN(weight)) return alert('Enter data');
        
        weights.push({ kittenId: kId, date, weight, id: Date.now() });
        localStorage.setItem('kt_weights_v3', JSON.stringify(weights));
        
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbyfzrJe2swPRpwEpgLn2B7zYLuZR4INZE2QGIqERMXhr-Ao8vGQpiMA5h0vRuBvtV2C/exec";
        fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({date, kitten: kId, weight, type: 'weight'}) });
        alert('Saved!');
        loadHistoryTable();
    }

    function loadDashboard() {
        const container = document.getElementById('reminders-container');
        container.innerHTML = '';
        const today = new Date(); today.setHours(0,0,0,0);
        
        const groups = {};
        kittens.forEach(k => {
            if(!k.dob) return;
            if(!groups[k.dob]) groups[k.dob] = [];
            groups[k.dob].push(k.name);
        });

        Object.keys(groups).forEach(dob => {
            const names = groups[dob].join(', ');
            [3, 5, 7, 9].forEach(w => {
                let d = new Date(dob); d.setDate(d.getDate() + (w * 7));
                let diff = Math.round((d - today) / 86400000);
                if (diff >= -3 && diff <= 14) {
                    container.innerHTML += `
                        <div class="reminder-card">
                            <strong>🐛 Deworming: ${w} Weeks Old</strong>
                            <p style="margin-bottom:5px;">For: ${names}</p>
                            Due: ${d.toDateString()}
