<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 Purr-fect Kitten Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --primary: #ffb6c1; --secondary: #a2d2ff; --background: #fff0f5; --card-bg: #ffffff; --text: #5c4d5c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }
        body { background-color: var(--background); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 600px; background: var(--card-bg); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; display: flex; flex-direction: column; min-height: 85vh; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; font-size: 1.5em; font-weight: 700; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .nav { display: flex; justify-content: space-around; background: #fff; padding: 15px 5px; border-bottom: 2px solid var(--background); flex-wrap: wrap; }
        .nav button { background: none; border: none; font-size: 0.95em; font-weight: 600; color: #b0a0b0; cursor: pointer; padding: 5px 8px; border-radius: 15px; transition: all 0.3s; }
        .nav button.active { color: white; background: var(--secondary); }
        .content { padding: 20px; flex-grow: 1; overflow-y: auto; }
        .section { display: none; }
        .section.active { display: block; }
        .reminder-card { background: #fff9e6; border-left: 5px solid #ffcc00; padding: 15px; border-radius: 10px; margin-bottom: 15px; font-size: 0.9em; }
        .reminder-card strong { display: block; margin-bottom: 5px; color: #d4a000; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9em; }
        input, select { width: 100%; padding: 12px; border: 2px solid var(--background); border-radius: 10px; }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9em; }
        .history-table th { background: var(--background); color: var(--secondary); padding: 10px; text-align: left; }
        .history-table td { padding: 10px; border-bottom: 1px solid #eee; }
        .chart-container { position: relative; height: 250px; width: 100%; margin-bottom: 25px; }
        .kitten-edit { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .insight-card { background: var(--background); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">🐾 Kitten Tracker</div>
    <div class="nav">
        <button class="active" onclick="switchTab('dashboard', this)">Home</button>
        <button onclick="switchTab('weighin', this)">Weigh In</button>
        <button onclick="switchTab('history', this)">History & Chart</button>
        <button onclick="switchTab('insights', this)">Insights</button>
        <button onclick="switchTab('settings', this)">Settings</button>
    </div>

    <div class="content">
        <div id="dashboard" class="section active">
            <h3 style="margin-bottom: 15px; color: var(--primary);">Health Reminders 🍼</h3>
            <div id="reminders-container"></div>
        </div>
        <div id="weighin" class="section">
            <h3 style="margin-bottom: 20px; color: var(--primary);">New Weigh-In ⚖️</h3>
            <select id="kitten-select" class="form-group"></select>
            <input type="date" id="weigh-date" class="form-group">
            <input type="number" id="weight-input" placeholder="Weight (g)" class="form-group">
            <button class="btn-submit" onclick="saveWeight()">Save Weight</button>
            <div id="save-msg" style="color: mediumseagreen; margin-top: 10px; display: none;">Saved successfully!</div>
        </div>
        <div id="history" class="section">
            <div class="chart-container"><canvas id="growthChart"></canvas></div>
            <table class="history-table"><thead><tr><th>Date</th><th>Kitten</th><th>Weight</th></tr></thead><tbody id="history-table-body"></tbody></table>
        </div>
        <div id="insights" class="section">
            <div class="insight-card"><div id="weekly-gainers"></div></div>
        </div>
        <div id="settings" class="section">
            <h3 style="margin-bottom: 20px; color: var(--primary);">Manage Kittens 🐱</h3>
            <div id="kitten-edit-list"></div>
            <button class="btn-submit" style="margin-top: 15px;" onclick="saveKittenNames()">Save Changes</button>
            <button class="btn-submit" style="margin-top: 15px; background: #ff6b6b;" onclick="resetAppData()">Clear All Data</button>
            <div id="settings-msg" style="color: mediumseagreen; margin-top: 10px; text-align: center; display: none;">Updated!</div>
        </div>
    </div>
</div>

<script>
    let kittens = JSON.parse(localStorage.getItem('kt_kittens_v3')) || [
        { id: 'p_gray', name: 'Gray Collar', dob: '2026-05-25' },
        { id: 'p_red', name: 'Red Collar', dob: '2026-05-25' },
        { id: 'p_violet', name: 'Violet Collar', dob: '2026-05-25' },
        { id: 'p_pink', name: 'Pink Collar', dob: '2026-05-25' },
        { id: 's_black', name: 'Black Collar', dob: '2026-06-01' },
        { id: 's_white', name: 'White Collar', dob: '2026-06-01' }
    ];
    let weights = JSON.parse(localStorage.getItem('kt_weights_v3')) || [];
    let myChart = null;

    function switchTab(tabId, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
        if(tabId === 'dashboard') loadDashboard();
        if(tabId === 'history') { loadHistoryTable(); renderChart(); }
    }

    function populateDropdown() {
        document.getElementById('kitten-select').innerHTML = kittens.map(k => `<option value="${k.id}">${k.name}</option>`).join('');
    }

    function populateSettings() {
        document.getElementById('kitten-edit-list').innerHTML = kittens.map(k => `
            <div class="kitten-edit" style="display:flex; flex-direction:column; margin-bottom:15px;">
                <label>Name</label><input type="text" id="edit-name-${k.id}" value="${k.name}">
                <label>Birthdate</label><input type="date" id="edit-dob-${k.id}" value="${k.dob || ''}">
            </div>
        `).join('');
    }

    async function saveWeight() {
        const kId = document.getElementById('kitten-select').value;
        const date = document.getElementById('weigh-date').value;
        const weight = parseFloat(document.getElementById('weight-input').value);
        if(!date || isNaN(weight)) return alert('Enter data');
        
        weights.push({ kittenId: kId, date, weight, id: Date.now() });
        localStorage.setItem('kt_weights_v3', JSON.stringify(weights));
        
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbyfzrJe2swPRpwEpgLn2B7zYLuZR4INZE2QGIqERMXhr-Ao8vGQpiMA5h0vRuBvtV2C/exec";
        fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({date, kitten: kId, weight, type: 'weight'}) });
        
        document.getElementById('save-msg').style.display = 'block';
        setTimeout(() => document.getElementById('save-msg').style.display = 'none', 2000);
    }

    function loadDashboard() {
        const container = document.getElementById('reminders-container');
        container.innerHTML = '';
        const today = new Date(); today.setHours(0,0,0,0);
        kittens.forEach(k => {
            if(!k.dob) return;
            [3, 5, 7, 9].forEach(w => {
                let d = new Date(k.dob); d.setDate(d.getDate() + (w * 7));
                let diff = Math.round((d - today) / 86400000);
                if (diff >= -3 && diff <= 14) container.innerHTML += `<div class="reminder-card"><strong>🐛 ${k.name} (${w}w)</strong> Due: ${d.toDateString()} (${diff < 0 ? 'OVERDUE' : diff + ' days'})</div>`;
            });
        });
    }

    function renderChart() {
        const ctx = document.getElementById('growthChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, { type: 'line', data: { labels: [...new Set(weights.map(w => w.date))].sort(), datasets: kittens.map(k => ({ label: k.name, data: [...new Set(weights.map(w => w.date))].sort().map(d => weights.find(w => w.kittenId === k.id && w.date === d)?.weight || null), tension: 0.3 })) }, options: { maintainAspectRatio: false } });
    }

    function loadHistoryTable() {
        document.getElementById('history-table-body').innerHTML = weights.sort((a,b) => new Date(b.date) - new Date(a.date)).map(w => `<tr><td>${w.date}</td><td>${kittens.find(k=>k.id===w.kittenId)?.name || 'Unknown'}</td><td>${w.weight}g</td></tr>`).join('');
    }

    function saveKittenNames() {
        kittens.forEach(k => {
            k.name = document.getElementById(`edit-name-${k.id}`).value;
            k.dob = document.getElementById(`edit-dob-${k.id}`).value;
        });
        localStorage.setItem('kt_kittens_v3', JSON.stringify(kittens));
        populateDropdown();
        document.getElementById('settings-msg').style.display = 'block';
        setTimeout(() => document.getElementById('settings-msg').style.display = 'none', 2000);
    }

    function resetAppData() {
        if(confirm("Are you sure? This will delete ALL kitten and weight data!")) {
            localStorage.clear();
            location.reload();
        }
    }

    // Initialization
    document.getElementById('weigh-date').valueAsDate = new Date();
    populateDropdown();
    populateSettings();
    loadDashboard();
</script>
</body>
</html>
