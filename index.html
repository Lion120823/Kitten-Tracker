<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 Purr-fect Kitten Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ffb6c1; --secondary: #a2d2ff; --background: #fff0f5; --text: #5c4d5c; }
        * { box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        body { background-color: var(--background); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 600px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; min-height: 85vh; display: flex; flex-direction: column; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; font-weight: 700; font-size: 1.5em; }
        .nav { display: flex; justify-content: space-around; background: #fff; padding: 10px; border-bottom: 2px solid var(--background); }
        .nav button { background: none; border: none; font-weight: 600; color: #b0a0b0; cursor: pointer; padding: 5px; }
        .nav button.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .content { padding: 20px; flex-grow: 1; overflow-y: auto; }
        .section { display: none; }
        .section.active { display: block; }
        .reminder-card { background: #fff9e6; border-left: 5px solid #ffcc00; padding: 15px; margin-bottom: 10px; border-radius: 8px; font-size: 0.9em; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">🐾 Kitten Tracker</div>
    <div class="nav">
        <button class="active" onclick="switchTab('dashboard', this)">Home</button>
        <button onclick="switchTab('weighin', this)">Weigh In</button>
        <button onclick="switchTab('history', this)">History</button>
        <button onclick="switchTab('settings', this)">Settings</button>
    </div>
    <div class="content">
        <div id="dashboard" class="section active"><div id="reminders-container"></div></div>
        <div id="weighin" class="section">
            <select id="kitten-select"></select>
            <input type="date" id="weigh-date">
            <input type="number" id="weight-input" placeholder="Weight (g)">
            <button class="btn" onclick="saveWeight()">Save Weight</button>
        </div>
        <div id="history" class="section">
            <div style="height: 250px;"><canvas id="growthChart"></canvas></div>
            <table style="width:100%; font-size: 0.8em;" id="history-table"><thead><tr><th>Date</th><th>Kitten</th><th>Weight</th></tr></thead><tbody id="history-table-body"></tbody></table>
        </div>
        <div id="settings" class="section">
            <h3>Add New Kitten</h3>
            <input type="text" id="new-name" placeholder="Name">
            <input type="text" id="new-mother" placeholder="Mother">
            <input type="date" id="new-dob">
            <button class="btn" style="background:var(--secondary)" onclick="addKitten()">Add Kitten</button>
            <hr style="margin:20px 0;">
            <h3>Manage Existing</h3>
            <div id="kitten-edit-list"></div>
            <button class="btn" onclick="saveKittenNames()">Save Changes</button>
            <button class="btn" style="background:#ff6b6b" onclick="resetAppData()">Clear All Data</button>
        </div>
    </div>
</div>

<script>
    let kittens = JSON.parse(localStorage.getItem('kt_kittens_v3')) || [
        { id: 'p_gray', name: 'Gray Collar', mother: 'Porchetta', dob: '2026-05-25' },
        { id: 's_black', name: 'Black Collar', mother: 'Sassy', dob: '2026-06-01' }
    ];
    let weights = JSON.parse(localStorage.getItem('kt_weights_v3')) || [];
    let dewormingDone = JSON.parse(localStorage.getItem('kt_deworming_done')) || [];

    function switchTab(tab, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
        btn.classList.add('active');
        if(tab === 'dashboard') loadDashboard();
        if(tab === 'history') { renderChart(); loadHistoryTable(); }
        if(tab === 'settings') populateSettings();
        if(tab === 'weighin') populateDropdown();
    }

    function loadDashboard() {
        const container = document.getElementById('reminders-container');
        container.innerHTML = '<h3>Upcoming Deworming 🍼</h3>';
        const litters = [...new Set(kittens.map(k => k.mother))];
        litters.forEach(mother => {
            const litterKittens = kittens.filter(k => k.mother === mother);
            if(litterKittens.length === 0 || !litterKittens[0].dob) return;
            const dob = new Date(litterKittens[0].dob);
            let found = false;
            [3, 5, 7, 9].forEach(w => {
                if(found) return;
                let key = `${mother}-${w}`;
                if(!dewormingDone.includes(key)) {
                    let d = new Date(dob); d.setDate(d.getDate() + (w * 7));
                    container.innerHTML += `<div class="reminder-card"><strong>🐛 ${mother}'s Litter: ${w} Weeks</strong><br>Due: ${d.toDateString()}<br><button class="btn" onclick="markDone('${key}')">Mark as Done</button></div>`;
                    found = true;
                }
            });
        });
        container.innerHTML += '<h3>Top Gainers 📈</h3>';
        kittens.map(k => {
            const kW = weights.filter(w => w.kittenId === k.id).sort((a,b) => new Date(b.date) - new Date(a.date));
            return { name: k.name, diff: kW.length >= 2 ? kW[0].weight - kW[1].weight : 0 };
        }).sort((a, b) => b.diff - a.diff).slice(0, 3).forEach(g => {
            container.innerHTML += `<div class="reminder-card"><strong>${g.name}</strong>: +${g.diff}g</div>`;
        });
    }

    function markDone(key) { dewormingDone.push(key); localStorage.setItem('kt_deworming_done', JSON.stringify(dewormingDone)); loadDashboard(); }

    function addKitten() {
        const name = document.getElementById('new-name').value;
        const mother = document.getElementById('new-mother').value;
        const dob = document.getElementById('new-dob').value;
        if(!name) return alert("Enter a name");
        kittens.push({ id: 'k_'+Date.now(), name, mother, dob });
        localStorage.setItem('kt_kittens_v3', JSON.stringify(kittens));
        alert("Added!"); populateSettings();
    }

    function populateSettings() {
        document.getElementById('kitten-edit-list').innerHTML = kittens.map(k => `
            <div style="margin-bottom:10px; padding:10px; border:1px solid #eee;">
                <label>Name</label><input type="text" value="${k.name}" id="name-${k.id}">
                <label>DOB</label><input type="date" value="${k.dob||''}" id="dob-${k.id}">
            </div>
        `).join('');
    }

    function saveKittenNames() {
        kittens.forEach(k => { k.name = document.getElementById(`name-${k.id}`).value; k.dob = document.getElementById(`dob-${k.id}`).value; });
        localStorage.setItem('kt_kittens_v3', JSON.stringify(kittens));
        alert("Saved!"); loadDashboard();
    }

    function saveWeight() {
        const kId = document.getElementById('kitten-select').value;
        const date = document.getElementById('weigh-date').value;
        const weight = parseFloat(document.getElementById('weight-input').value);
        if(!date || isNaN(weight)) return alert('Enter data');
        weights.push({ kittenId: kId, date, weight });
        localStorage.setItem('kt_weights_v3', JSON.stringify(weights));
        alert('Saved!'); loadHistoryTable();
    }

    function renderChart() {
        const ctx = document.getElementById('growthChart').getContext('2d');
        const dates = [...new Set(weights.map(w => w.date))].sort();
        if(window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, { type: 'line', data: { labels: dates, datasets: kittens.map(k => ({ label: k.name, data: dates.map(d => weights.find(w => w.kittenId === k.id && w.date === d)?.weight || null) })) } });
    }

    function loadHistoryTable() {
        document.getElementById('history-table-body').innerHTML = weights.sort((a,b) => new Date(b.date) - new Date(a.date)).map(w => `<tr><td>${w.date}</td><td>${kittens.find(k=>k.id===w.kittenId)?.name}</td><td>${w.weight}g</td></tr>`).join('');
    }

    function populateDropdown() { document.getElementById('kitten-select').innerHTML = kittens.map(k => `<option value="${k.id}">${k.name}</option>`).join(''); }
    function resetAppData() { if(confirm("Delete all?")) { localStorage.clear(); location.reload(); } }
    
    document.getElementById('weigh-date').valueAsDate = new Date();
    loadDashboard();
</script>
</body>
</html>
